<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-loading">
    <main class="screen mode-slideshow" id="screen">
      <header class="topbar">
        <div class="brand">SMART TASK MANAGER</div>
        <div class="status-cluster">
          <span id="countdownBadge" class="badge badge-countdown hidden"></span>
          <span id="clockBadge" class="badge badge-clock"></span>
        </div>
      </header>

      <section class="stage" id="stage">
        <img id="heroImage" class="hero-image hidden" alt="Display visual" />

        <div id="emptyDisplayMessage" class="empty-display-message hidden"></div>

        <article class="content-card" id="contentCard">
          <h1 id="primaryText"></h1>
          <p id="secondaryText"></p>
          <div class="meta-row">
            <span id="timeText" class="meta-pill"></span>
            <span id="hintText" class="meta-pill"></span>
          </div>
        </article>
      </section>

      <aside id="bannerStrip" class="banner-strip hidden">
        <p id="bannerTitle" class="banner-title"></p>
        <p id="bannerSubtitle" class="banner-subtitle"></p>
      </aside>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
