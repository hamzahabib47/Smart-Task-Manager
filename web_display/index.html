<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen mode-slideshow" id="screen">
      <header class="topbar">
        <div class="brand">SMART TASK MANAGER</div>
        <div class="status-cluster">
          <span id="countdownBadge" class="badge badge-countdown hidden"
            >Auto close in 30s</span
          >
          <span id="clockBadge" class="badge badge-clock">--:--:--</span>
        </div>
      </header>

      <section class="stage" id="stage">
        <img id="heroImage" class="hero-image hidden" alt="Display visual" />

        <div id="emptyDisplayMessage" class="empty-display-message hidden">
          Add Images from mobile app to show on the display
        </div>

        <article class="content-card" id="contentCard">
          <h1 id="primaryText">NO UPCOMING TASK</h1>
          <p id="secondaryText">Waiting for upcoming tasks.</p>
          <div class="meta-row">
            <span id="timeText" class="meta-pill">--:--</span>
            <span id="hintText" class="meta-pill">Display active</span>
          </div>
        </article>
      </section>

      <aside id="bannerStrip" class="banner-strip hidden">
        <p id="bannerTitle" class="banner-title">Reminder</p>
        <p id="bannerSubtitle" class="banner-subtitle">Task reminder active</p>
      </aside>

      <button id="fullscreenBtn" class="fullscreen-btn" title="Toggle fullscreen">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
      </button>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
