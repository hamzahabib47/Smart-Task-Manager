name: smart_time_manager_mobile
description: Smart Time Manager mobile controller app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.4.0
  firebase_messaging: ^15.0.0
  geocoding: ^3.0.0
  geofence_service: ^5.0.0
  geolocator: ^12.0.0
  http: ^1.2.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: web/icons/stm_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: web/icons/stm_icon.png

flutter:
  uses-material-design: true
